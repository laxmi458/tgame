<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoWood MiniGames</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://alwingulla.com/88/tag.min.js" data-zone="YOUR_ZONE_ID" async data-cfasync="false"></script>
</head>
<body class="offline-theme">
    
    <header class="dashboard">
        <div class="user-info">
            <span id="player-name">Player</span>
            <div class="coin-display">💰 <span id="coin-count">0</span></div>
        </div>
        <button id="theme-toggle">Switch to ONLINE</button>
    </header>

    <main id="app-container">
        <section id="menu-screen" class="active">
            <h1 id="game-title">WOODEN TIC-TAC-TOE</h1>
            <div class="menu-buttons">
                <button onclick="ui.showScreen('game-setup')">PLAY GAME</button>
                <button onclick="ui.showScreen('shop-screen')">SHOP</button>
                <button onclick="ui.showScreen('leaderboard')">RANKING</button>
                <button class="ad-btn" onclick="ads.showRewardAd()">📺 WATCH AD (+20)</button>
            </div>
        </section>

        <section id="game-screen">
            <div class="game-status" id="status-text">Your Turn</div>
            <div class="grid" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <button class="exit-btn" onclick="game.exit()">Quit Game</button>
        </section>

        <section id="shop-screen">
            <h2>COIN SHOP</h2>
            <div class="shop-item">
                <span>Neon Skin</span>
                <button onclick="game.buySkin('neon', 500)">500 💰</button>
            </div>
            <button onclick="ui.showScreen('menu-screen')">Back</button>
        </section>
    </main>

    <div id="banner-ad-container"></div>

    <script src="ads.js"></script>
    <script src="script.js"></script>
</body>
</html>
